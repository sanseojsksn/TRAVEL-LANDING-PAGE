<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packages Tour</title>

<link rel="stylesheet" href="packages.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<section class="packages-section">

<div class="packages-title">
<h1>Our Travel Packages</h1>
<p>Choose your dream destination</p>
</div>

<div class="packages-grid">

<div class="package-card">
<img src="burj khalifa.jpeg" alt="">
<div class="package-content">
<h2>Dubai Tour</h2>
<p>7 Days / 6 Nights</p>
<p>5 Star Hotel Included</p>
<div class="price">₹50,000</div>
<a href="#" class="book-btn">Book Now</a>
</div>
</div>

<div class="package-card">
<img src="eiffel tower.jpeg" alt="">
<div class="package-content">
<h2>Paris Tour</h2>
<p>5 Days / 4 Nights</p>
<p>Breakfast Included</p>
<div class="price">₹70,000</div>
<a href="#" class="book-btn">Book Now</a>
</div>
</div>

<div class="package-card">
<img src="turkey.jpeg" alt="">
<div class="package-content">
<h2>Turkey Tour</h2>
<p>6 Days / 5 Nights</p>
<p>Luxury Stay</p>
<div class="price">₹60,000</div>
<a href="#" class="book-btn">Book Now</a>
</div>
</div>

</div>

</section>

</body>
</html>
